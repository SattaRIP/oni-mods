title: "Magpie Bridges+"
description: "An English-language companion and extension pack for Magpie Bridge (鹊桥).\n\nAdds 2-tile and 3-tile gap bridge variants for Automation Wires, Automation Ribbons, and Conveyor Rails, and — if you also run Ronivans Legacy – Industrial Revolution — its Logistic Solid, Heavy-Duty, and Heavy-Duty Joint Plate bridges. It also renames the base Magpie Bridge's liquid/gas/wire/conductive bridges to English and sorts every bridge into its correct build menu category (no more 'Label').\n\nREQUIRES: Magpie Bridge (鹊桥). OPTIONAL: Ronivans Legacy – Industrial Revolution (its bridges appear automatically when present). Subscribe to the required item via the Required Items panel."
staticID: "MagpieBridgesPlus"
