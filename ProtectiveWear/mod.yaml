title: "Protective Wear"
description: "Refashion your clothing into heavier protective gear at the Clothing Refashionator.\n\nWinter Coat: a Warm Sweater rebuilt into a thicker insulated coat with markedly better cold protection (Warm Sweater + reed fiber).\n\nSoft Suit: a lightweight, checkpoint-free alternative to the Atmo Suit (Warm Sweater + Swimwear + reed fiber). While worn it grants mild protection from cold, heat and radiation, a large breath reserve so dupes last much longer without fresh oxygen, and a slower-filling bladder for fewer bathroom breaks. It carries no air tank, so it only delays suffocation rather than preventing it -- weaker than a real Atmo Suit, but it needs no dock or checkpoint.\n\nStandalone -- no other mods required."
staticID: "ProtectiveWear"
