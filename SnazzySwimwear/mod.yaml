title: "Snazzy Swimwear"
description: "Refashion your Swimwear and Rubber Boots into snazzy gold-sequin versions at the Clothing Refashionator, for a decor boost while your duplicants stay dry-footed and swim-ready.\n\nSnazzy Swimwear: +25 decor. Snazzy Rubber Boots: +15 decor. Each is crafted from the plain item plus reed fiber (the rubber that made the original carries over). All the original protections are kept — swimming, dry feet, and no slipping.\n\nStandalone — no other mods required."
