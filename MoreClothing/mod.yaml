title: "More Clothing"
description: "Five new garments for better-dressed, better-protected dupes.\n\nAt the Clothing Refashionator:\n\nWinter Coat: a Warm Sweater rebuilt into a thicker insulated coat with markedly better cold protection (Warm Sweater + reed fiber).\n\nSoft Suit: a lightweight, checkpoint-free alternative to the Atmo Suit (Warm Sweater + Swimwear + reed fiber). Cold/heat/radiation protection, sealed against airborne germs and wetness, a big breath reserve dupes actually breathe from (no held breath until it runs low), fewer bathroom trips -- and a helmet that assembles piece by piece over the dupe's head when their surroundings turn dangerous. No air tank: it delays suffocation rather than preventing it.\n\nSnazzy Swimwear: gold-sequin Swimwear, +25 decor while worn (Swimwear + reed fiber).\n\nSnazzy Rubber Boots: a deep golden finish, +15 decor (Rubber Boots + reed fiber).\n\nAt the Textile Loom:\n\nShoes: sharp black-and-gold dress shoes, +15 decor, pure flourish (reed fiber).\n\nStandalone -- no other mods required. The Soft Suit and the two Snazzy upgrades use Bionic Booster Pack garments as ingredients; Winter Coat and Shoes are DLC-free."
staticID: "MoreClothing"
