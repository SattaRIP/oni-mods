title: "More Clothing"
description: "Five new garments and a Mannequin for better-dressed, better-protected dupes.

At the Clothing Refashionator:

Winter Coat: a Warm Sweater rebuilt into a thicker insulated coat with markedly better cold protection, and a touch of decor while worn (Warm Sweater + reed fiber).

Soft Suit: a lightweight, checkpoint-free alternative to the Atmo Suit (Warm Sweater + Swimwear + Rubber Boots + reed fiber). Cold/heat/radiation protection, sealed against airborne germs and wetness, a big breath reserve dupes actually breathe from (no held breath until it runs low), fewer bathroom trips -- and a helmet that assembles piece by piece over the dupe's head when their surroundings turn dangerous. Covers head to toe: the suit's own boots fill the shoes slot while worn. No air tank: it delays suffocation rather than preventing it.

Snazzy Swimwear: gold-sequin Swimwear, +25 decor while worn (Swimwear + reed fiber).

Snazzy Rubber Boots: a deep golden finish, +15 decor (Rubber Boots + reed fiber).

At the Textile Loom:

Shoes: sharp black-and-gold dress shoes, +15 decor, pure flourish (reed fiber).

NEW -- Mannequin (Furniture menu, Artistry research): a dressform that displays one piece of unused clothing for room decor. Fancier garments impress more.

Standalone -- no other mods required. The Soft Suit and the two Snazzy upgrades use Bionic Booster Pack garments as ingredients; Winter Coat, Shoes and the Mannequin are DLC-free."
