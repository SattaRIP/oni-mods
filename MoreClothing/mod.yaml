title: "More Clothing"
description: "Five new garments and a Mannequin for better-dressed, better-protected dupes.

At the Clothing Refashionator:

Winter Coat: a Warm Sweater rebuilt into a thicker insulated coat with markedly better cold protection, and a touch of decor while worn (Warm Sweater + fiber).

Soft Suit: a lightweight, checkpoint-free alternative to the Atmo Suit (Warm Sweater + Swimwear + Rubber Boots + Oxygen Mask + fiber). Cold/heat/radiation protection, sealed against airborne germs and wetness, a big breath reserve dupes actually breathe from (no held breath until it runs low), fewer bathroom trips -- and a helmet that assembles piece by piece over the dupe's head when their surroundings turn dangerous. Covers head to toe: the suit's own boots fill the shoes slot while worn. No air tank: it delays suffocation rather than preventing it.

Snazzy Swimwear: gold-sequin Swimwear, +25 decor while worn (Swimwear + fiber).

Snazzy Rubber Boots: a deep golden finish, +15 decor (Rubber Boots + fiber). Unlike vanilla footwear, these actually SHOW: dupes visibly wear tall gold boots.

At the Textile Loom:

Shoes: sharp black-and-gold dress shoes, +15 decor, pure flourish (fiber). Visible on dupes' feet while worn.

NEW -- Mannequin (Furniture menu, Textile Production research): a dupe-shaped display dummy that WEARS the clothing you give it -- garments render on its body exactly as they do on a dupe, boots go on its feet, and you can pick any hat for its head from the building's menu. A dressed Mannequin raises room decor; fancier garments impress more.

Fiber recipes accept Reed Fiber, Feather Fiber (Prehistoric DLC) or Rayon Fiber (Ronivans Legacy) interchangeably. Garments unlock with Textile Production research; the Soft Suit with Hazard Protection.

Standalone -- no other mods required. The Soft Suit and the two Snazzy upgrades use Bionic Booster Pack garments as ingredients; Winter Coat, Shoes and the Mannequin are DLC-free."
