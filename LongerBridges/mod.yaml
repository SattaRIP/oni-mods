title: "Longer Bridges"
description: "Adds 2-tile and 3-tile gap bridge variants for every utility type: Liquid Pipes, Gas Pipes, Power Wires, Conductive Wires, Insulated Conductive Wires, Automation Wires, Automation Ribbons, and Conveyor Rails — plus 2- and 3-tile-wide Heavi-Watt and Conductive Joint Plates for running heavy wire through thicker walls (with insulated 3-tile versions when the Insulated Joint Plate mod is installed). Each appears in its normal build-menu category, in English.\n\nIf Ronivans Legacy – Industrial Revolution is installed, its Logistic Solid, Heavy-Duty, and Heavy-Duty Joint Plate bridges get gap variants too (automatically). Standalone — no other mods required."
staticID: "LongerBridges"
